services:
    next-server:
        build: .
        container_name: short-real-server
        ports:
            - "3001:3000"
        volumes:
            - ./:/workdir
            - /workdir/node_modules
            - /workdir/.next
            - /workdir/.git
        environment:
            # - WATCHPACK_POLLING=true  <-- 리눅스에선 이제 필요 없으니 주석 처리!
            - DOCKER=true